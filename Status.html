<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leave Requests</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      background: #f5f5f5;
    }
    h2 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    th, td {
      padding: 8px 10px;
      border: 1px solid #ddd;
      font-size: 14px;
      text-align: left;
    }
    th {
      background: #4a90d9;
      color: #fff;
    }
    tr:nth-child(even) {
      background: #f9f9f9;
    }
    .status-approved { color: green; font-weight: bold; }
    .status-pending  { color: orange; font-weight: bold; }
    .status-rejected { color: red; font-weight: bold; }
    #loading {
      text-align: center;
      padding: 20px;
      color: #888;
    }
    .table-wrap {
      overflow-x: auto;
    }
  </style>
</head>
<body>

  <h2>Leave Requests</h2>
  <div id="loading">Loading data...</div>

  <div class="table-wrap">
    <table id="leaveTable" style="display:none;">
      <thead>
        <tr>
          <th>Year</th>
          <th>Form</th>
          <th>Name of Student</th>
          <th>Leave Type</th>
          <th>From</th>
          <th>To</th>
          <th>Reason</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    // Replace with your deployed Apps Script Web App URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbxOzAFqhW8g73XA6JHdWiNffEsjmBCATAM72yIIHyKs8qH0QM0RT6eMO4srNybkVQyIjw/exec';

    fetch(API_URL)
      .then(function(response) { return response.json(); })
      .then(renderTable)
      .catch(showError);

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      const loading = document.getElementById('loading');
      const table = document.getElementById('leaveTable');

      if (data.error) {
        loading.textContent = 'Error: ' + data.error;
        return;
      }

      if (!data || data.length === 0) {
        loading.textContent = 'No leave requests found.';
        return;
      }

      tbody.innerHTML = data.map(function(row) {
        const statusClass = getStatusClass(row.status);
        return '<tr>' +
          '<td>' + safe(row.year) + '</td>' +
          '<td>' + safe(row.form) + '</td>' +
          '<td>' + safe(row.name) + '</td>' +
          '<td>' + safe(row.leaveType) + '</td>' +
          '<td>' + safe(row.from) + '</td>' +
          '<td>' + safe(row.to) + '</td>' +
          '<td>' + safe(row.reason) + '</td>' +
          '<td class="' + statusClass + '">' + safe(row.status) + '</td>' +
        '</tr>';
      }).join('');

      loading.style.display = 'none';
      table.style.display = 'table';
    }

    function getStatusClass(status) {
      if (!status) return '';
      const s = status.toString().toLowerCase();
      if (s.indexOf('approve') !== -1) return 'status-approved';
      if (s.indexOf('pending') !== -1) return 'status-pending';
      if (s.indexOf('reject') !== -1) return 'status-rejected';
      return '';
    }

    function safe(val) {
      return (val === null || val === undefined) ? '' : val;
    }

    function showError(error) {
      document.getElementById('loading').textContent =
        'Error loading data: ' + error.message;
    }
  </script>

</body>
</html>
